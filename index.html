<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>📋 우리 집 매니저</title>

<!-- 모바일 터치 드래그 앤 드롭을 위한 SortableJS 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<!-- Firebase v10 CDN -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, doc,
    addDoc, updateDoc, deleteDoc,
    onSnapshot, arrayUnion, serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  /* ====================================================
     🔑 여기에 본인의 Firebase 프로젝트 설정을 입력하세요.
  ==================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyDhFAROrgAiaqjXB-TcCLfVzwnRvdRH3yc",
    authDomain: "homework-87845.firebaseapp.com",
    projectId: "homework-87845",
    storageBucket: "homework-87845.firebasestorage.app",
    messagingSenderId: "705292024213",
    appId: "1:705292024213:web:fb7d893c9e4993669f9e9c"
  };
  /* ==================================================== */

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const ZONES_COL = "zones";

  /* ── 역할 목록 ───────────────────────────── */
  const ROLES = ["아빠", "엄마", "미네"];
  const PENALTY_EMOJIS = ["🙄","😛","😜","🤪","😶","🤨","🤔","🤫","🫣","🫩","😵‍💫","🤢","🤮","😠","😡","🤬","👿","☠️"];
  const MOON_PHASES = ["🌑", "🌒", "🌓", "🌔", "🌝"]; // 달 차오르는 단계

  /* ── 상태 ─────────────────────────────────────── */
  let currentRole  = localStorage.getItem("hm_role") || null;
  let currentEmoji = localStorage.getItem("hm_emoji") || null;
  let collapsedGroups = JSON.parse(localStorage.getItem("hm_collapsed") || "{}"); 
  let openCommentIds = new Set();
  let zonesData    = [];
  let rouletteActive = false;

  /* ── DOM 참조 ─────────────────────────────────── */
  const memberModal   = document.getElementById("member-modal");
  const roleSelect    = document.getElementById("inp-role");
  const profileEmoji  = document.getElementById("inp-profile-emoji");
  const saveMemberBtn = document.getElementById("save-member-btn");
  const memberBadge   = document.getElementById("member-badge");
  
  const kingBanner    = document.getElementById("king-banner");
  const rouletteBtn   = document.getElementById("roulette-btn");
  const rouletteCard  = document.getElementById("roulette-card");
  const zonesEl       = document.getElementById("zones");
  const addModal      = document.getElementById("add-modal");
  const addForm       = document.getElementById("add-form");
  const fab           = document.getElementById("fab");
  const confettiLayer = document.getElementById("confetti-layer");

  /* ── 멤버 설정 ──────────────────────────── */
  function renderMemberModal() {
    roleSelect.innerHTML = ROLES.map(r => `<option value="${r}" ${r===currentRole?'selected':''}>${r}</option>`).join("");
    profileEmoji.value = currentEmoji || "😀";
    memberModal.classList.remove("hidden");
  }

  saveMemberBtn.onclick = () => {
    currentRole = roleSelect.value;
    currentEmoji = profileEmoji.value || "😀";
    localStorage.setItem("hm_role", currentRole);
    localStorage.setItem("hm_emoji", currentEmoji);
    memberModal.classList.add("hidden");
    updateMemberBadge();
    renderZones();
  };

  function updateMemberBadge() {
    if(currentRole && currentEmoji) {
      memberBadge.textContent = `${currentEmoji} ${currentRole}`;
    }
  }

  document.getElementById("change-member-btn").onclick = renderMemberModal;

  /* ── Firestore 실시간 구독 ─────────────────────── */
  onSnapshot(collection(db, ZONES_COL), snap => {
    zonesData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    zonesData.sort((a, b) => (a.order || 0) - (b.order || 0));
    renderZones();
  });

  /* ── 경과일 계산 ──────────────────────────────── */
  function daysSince(ts) {
    if (!ts) return null;
    const ms = ts.toDate ? ts.toDate().getTime() : (typeof ts === 'number' ? ts : ts.seconds * 1000);
    const today = new Date();
    today.setHours(0,0,0,0);
    const target = new Date(ms);
    target.setHours(0,0,0,0);
    return Math.floor((today - target) / 86400000);
  }

  /* ── 오늘의 활동왕 계산 ────────────────────────── */
  function updateKingBanner() {
    let counts = {};
    ROLES.forEach(r => counts[r] = 0);
    let maxCount = 0;
    let kingRole = null;
    let kingEmoji = "👑";

    zonesData.forEach(z => {
      if(daysSince(z.lastCleaned) === 0 && z.lastWho) {
        ROLES.forEach(r => {
          if(z.lastWho.includes(r)) {
            counts[r]++;
            if(counts[r] > maxCount) {
              maxCount = counts[r];
              kingRole = r;
              kingEmoji = z.lastWho.replace(r, '').trim() || "👑";
            }
          }
        });
      }
    });

    if(maxCount > 0) {
      kingBanner.innerHTML = `🏆 오늘의 활동왕: <strong>${kingEmoji} ${kingRole}</strong> (${maxCount}개 완료!)`;
      kingBanner.classList.remove("hidden");
    } else {
      kingBanner.classList.add("hidden");
    }
  }

  /* ── 리스트 렌더링 ─────────────────────────── */
  function renderZones() {
    zonesEl.innerHTML = "";
    updateKingBanner(); 

    if (zonesData.length === 0) {
      zonesEl.innerHTML = `<div class="empty-state"><span class="empty-icon">📝</span><p>아직 항목이 없어요.<br>+ 버튼으로 할 일을 추가해 보세요!</p></div>`;
      return;
    }

    const myZones = zonesData.filter(z => z.assignee === currentRole);
    const otherZones = zonesData.filter(z => z.assignee !== currentRole);

    let renderGroups = [];
    if (myZones.length > 0) {
      renderGroups.push({ title: "📌 내 당번 항목", zones: myZones });
    }

    const categories = [...new Set(otherZones.map(z => z.category || "기타"))];
    categories.forEach(cat => {
      const catZones = otherZones.filter(z => (z.category || "기타") === cat);
      if (catZones.length > 0) renderGroups.push({ title: `📂 ${cat}`, zones: catZones });
    });

    let savedGroupOrder = JSON.parse(localStorage.getItem('hm_group_order') || "[]");
    renderGroups.sort((a, b) => {
      let idxA = savedGroupOrder.indexOf(a.title);
      let idxB = savedGroupOrder.indexOf(b.title);
      if(idxA === -1) idxA = 999;
      if(idxB === -1) idxB = 999;
      return idxA - idxB;
    });

    renderGroups.forEach(group => renderGroupUI(group.title, group.zones));

    Sortable.create(zonesEl, {
      handle: '.group-drag-handle',
      animation: 150,
      delay: 150,
      delayOnTouchOnly: true,
      ghostClass: "sortable-ghost-group",
      onEnd: function () {
        const titles = Array.from(zonesEl.querySelectorAll('.group-title')).map(el => el.dataset.title);
        localStorage.setItem('hm_group_order', JSON.stringify(titles));
      }
    });
  }

  function renderGroupUI(title, zones) {
    const isCollapsed = collapsedGroups[title] || false;
    
    const groupEl = document.createElement("div");
    groupEl.className = "zone-group";
    
    groupEl.innerHTML = `
      <div class="group-title" data-title="${title}">
        <div style="display:flex; align-items:center;">
          <span class="group-drag-handle" title="그룹 이동">≡</span>
          <span class="group-name-text">${title}</span>
        </div>
        <span class="toggle-icon">${isCollapsed ? "◀️" : "🔽"}</span>
      </div>
    `;
    
    const listEl = document.createElement("div");
    listEl.className = `group-list ${isCollapsed ? 'hidden' : ''}`;

    zones.forEach(zone => {
      const days = daysSince(zone.lastCleaned);
      const cycle = zone.cycle || 3;
      const overdue = days !== null && days > cycle;
      const progress = zone.progress || 0; // 달력 단계 (0~3)

      let statusEmoji = "";
      let dayLabel = "기록 없음";

      if (days === null) {
        statusEmoji = ""; 
      } else if (days === 0) {
        dayLabel = "오늘 완료 😎";
      } else {
        dayLabel = `D+${days}`;
        if (overdue) {
          let pIndex = (days - cycle) - 1;
          pIndex = Math.max(0, Math.min(pIndex, PENALTY_EMOJIS.length - 1));
          statusEmoji = PENALTY_EMOJIS[pIndex];
        } else {
          statusEmoji = "✨";
        }
      }

      const assigneeLabel = zone.assignee && zone.assignee !== '공통' ? `<span class="assignee-badge">${zone.assignee} 당번</span>` : '';
      const commentsObj = (typeof zone.comments === 'object' && zone.comments !== null) ? zone.comments : {};
      
      const commentsHtml = Object.entries(commentsObj)
        .map(([role, data]) => `<div class="comment-line"><span class="comment-author">${data.emoji || ''} ${role}:</span> <span class="comment-text">${data.text}</span></div>`)
        .join("");
      const myCommentText = commentsObj[currentRole] ? commentsObj[currentRole].text : '';
      
      const hasComments = Object.keys(commentsObj).length > 0;

      const card = document.createElement("div");
      card.className = `zone-card ${overdue ? "overdue" : ""} ${days===0 ? "cleared" : ""}`;
      card.dataset.id = zone.id; 
      
      card.innerHTML = `
        <div class="zone-main">
          <div class="zone-emoji">${zone.emoji || "📝"}${statusEmoji}</div>
          <div class="zone-info">
            <div class="zone-name-row">
              <strong class="zone-name">${zone.name}</strong>
              ${assigneeLabel}
            </div>
            <div class="zone-meta">
              목표 ${cycle}일 <span class="divider">|</span> 
              <span class="${overdue ? "text-red" : (days===0 ? "text-green" : "")} bold">${dayLabel}</span>
              ${zone.lastWho ? `<span class="last-who">(${zone.lastWho})</span>` : ""}
            </div>
          </div>
          
          <div class="zone-actions">
            ${ days === 0 
              ? `<button class="action-btn undo-btn" data-id="${zone.id}" title="취소">↩️</button>` 
              : `<button class="action-btn progress-btn" data-id="${zone.id}" data-prog="${progress}" data-emoji="${zone.emoji||"✨"}" title="진행상황">
                  ${MOON_PHASES[progress]}
                 </button>`
            }
            <button class="action-btn memo-btn ${hasComments ? 'has-memo' : ''}" data-id="${zone.id}" title="메모">💬</button>
            <button class="action-btn edit-btn" data-id="${zone.id}" title="수정">⚙️</button>
          </div>
        </div>
        
        <div class="zone-comments ${openCommentIds.has(zone.id) ? '' : 'hidden'}" id="comments-${zone.id}">
          ${commentsHtml ? `<div class="comments-list">${commentsHtml}</div>` : ""}
          <div class="comment-input-wrap">
            <span class="my-comment-label">나의 메모</span>
            <input type="text" class="comment-input" data-id="${zone.id}" value="${myCommentText}" placeholder="코멘트 남기기..." />
          </div>
        </div>
      `;

      listEl.appendChild(card);
    });

    groupEl.appendChild(listEl);
    zonesEl.appendChild(groupEl);

    const titleHeader = groupEl.querySelector(".group-title");
    titleHeader.addEventListener('click', (e) => {
      if(e.target.classList.contains('group-drag-handle')) return; 
      collapsedGroups[title] = !collapsedGroups[title];
      localStorage.setItem("hm_collapsed", JSON.stringify(collapsedGroups));
      renderZones(); 
    });

    if (!isCollapsed) {
      Sortable.create(listEl, {
        delay: 250, 
        delayOnTouchOnly: true, 
        animation: 150,
        ghostClass: "sortable-ghost", 
        filter: "button, input", 
        preventOnFilter: false, 
        onEnd: async function () {
          const itemEls = Array.from(listEl.querySelectorAll('.zone-card'));
          const originalOrders = zones.map(z => z.order || Date.now()).sort((a, b) => a - b);
          itemEls.forEach((el, index) => {
            const id = el.dataset.id;
            updateDoc(doc(db, ZONES_COL, id), { order: originalOrders[index] });
          });
        }
      });
    }

    /* 이벤트 위임 */
    listEl.querySelectorAll(".progress-btn").forEach(btn => {
      btn.onclick = async () => {
        const id = btn.dataset.id;
        const currentProg = parseInt(btn.dataset.prog);
        vibrateShort();
        
        if (currentProg < 3) {
          // 달 차오르기 (0 -> 1 -> 2 -> 3)
          await updateDoc(doc(db, ZONES_COL, id), { progress: currentProg + 1 });
        } else {
          // 3(🌔)에서 한 번 더 누르면 4(🌝) 완료 처리!
          clearZone(id, btn.dataset.emoji);
        }
      };
    });

    listEl.querySelectorAll(".undo-btn").forEach(btn => btn.onclick = () => undoClear(btn.dataset.id));
    listEl.querySelectorAll(".edit-btn").forEach(btn => btn.onclick = () => openEditModal(btn.dataset.id));
    listEl.querySelectorAll(".comment-input").forEach(inp => inp.onchange = (e) => updateComment(inp.dataset.id, e.target.value));
    
    listEl.querySelectorAll(".memo-btn").forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        const commentBlock = document.getElementById(`comments-${id}`);
        if (openCommentIds.has(id)) {
          openCommentIds.delete(id);
          commentBlock.classList.add("hidden");
        } else {
          openCommentIds.add(id);
          commentBlock.classList.remove("hidden");
        }
      };
    });
  }

  /* ── 기능 함수들 ──────────────────────────────── */
  async function clearZone(id, emoji) {
    if (!currentRole) { alert("먼저 가족 멤버를 선택해 주세요!"); return; }
    vibrateShort();
    const now = Date.now();
    await updateDoc(doc(db, ZONES_COL, id), {
      lastCleaned: Timestamp.fromMillis(now),
      lastWho:     `${currentEmoji}${currentRole}`,
      history:     arrayUnion(now),
      progress:    0 // 완료 시 다음 주기를 위해 달을 다시 🌑으로 초기화
    });
    // 보름달(🌝)이 완료 폭죽과 함께 뜹니다!
    launchConfetti("🌝");
  }

  async function undoClear(id) {
    if (!confirm("완료 기록을 취소하시겠습니까?")) return;
    const zone = zonesData.find(z => z.id === id);
    if (!zone) return;
    
    let newHistory = [...(zone.history || [])];
    newHistory.pop();
    
    let newLastCleaned = null;
    let newLastWho = "";
    if (newHistory.length > 0) {
      newLastCleaned = Timestamp.fromMillis(newHistory[newHistory.length - 1]);
      newLastWho = "이전 기록 복구됨";
    }

    await updateDoc(doc(db, ZONES_COL, id), {
      lastCleaned: newLastCleaned,
      history: newHistory,
      lastWho: newLastWho,
      progress: 3 // 취소하면 🌔 상태로 되돌려줌
    });
  }

  async function updateComment(id, text) {
    if (!currentRole) { alert("먼저 멤버를 설정해 주세요!"); return; }
    const zone = zonesData.find(z => z.id === id);
    if (!zone) return;
    
    const comments = (typeof zone.comments === 'object' && zone.comments !== null) ? { ...zone.comments } : {};
    
    if (text.trim() === "") {
      delete comments[currentRole];
    } else {
      comments[currentRole] = { emoji: currentEmoji, text: text.trim() };
    }
    await updateDoc(doc(db, ZONES_COL, id), { comments });
  }

  async function deleteZone(id) {
    if (!confirm("이 항목을 정말 삭제할까요?")) return;
    await deleteDoc(doc(db, ZONES_COL, id));
    addModal.classList.add("hidden");
  }

  /* ── 추가/수정 모달 ────────────────────────────── */
  let editingId = null;

  fab.onclick = () => openAddModal();

  function openAddModal() {
    editingId = null;
    addForm.reset();
    document.getElementById("modal-title").textContent = "항목 추가";
    document.getElementById("submit-label").textContent = "추가하기";
    document.getElementById("btn-delete-zone").classList.add("hidden");
    populateAssigneeSelect();
    addModal.classList.remove("hidden");
  }

  function openEditModal(id) {
    const zone = zonesData.find(z => z.id === id);
    if (!zone) return;
    editingId = id;
    populateAssigneeSelect();
    document.getElementById("inp-name").value  = zone.name  || "";
    document.getElementById("inp-category").value = zone.category || "";
    document.getElementById("inp-emoji").value = zone.emoji || "";
    document.getElementById("inp-cycle").value = zone.cycle || 3;
    document.getElementById("inp-assignee").value = zone.assignee || "공통";
    
    document.getElementById("modal-title").textContent = "항목 수정";
    document.getElementById("submit-label").textContent = "저장하기";
    document.getElementById("btn-delete-zone").classList.remove("hidden");
    addModal.classList.remove("hidden");
  }

  function populateAssigneeSelect() {
    const sel = document.getElementById("inp-assignee");
    sel.innerHTML = `<option value="공통">공통 (모두 함께)</option>` + 
                    ROLES.map(r => `<option value="${r}">${r}</option>`).join("");
  }

  document.getElementById("close-add-modal").onclick = () => addModal.classList.add("hidden");
  document.getElementById("btn-delete-zone").onclick = () => { if(editingId) deleteZone(editingId); };

  addForm.onsubmit = async e => {
    e.preventDefault();
    const name     = document.getElementById("inp-name").value.trim();
    const category = document.getElementById("inp-category").value.trim() || "기타";
    const emoji    = document.getElementById("inp-emoji").value.trim() || "📝";
    const cycle    = parseInt(document.getElementById("inp-cycle").value) || 1;
    const assignee = document.getElementById("inp-assignee").value;

    if (!name) return;

    if (editingId) {
      await updateDoc(doc(db, ZONES_COL, editingId), { name, category, emoji, cycle, assignee });
    } else {
      await addDoc(collection(db, ZONES_COL), {
        name, category, emoji, cycle, assignee,
        order: Date.now(),
        lastCleaned: null, lastWho: "", history: [], comments: {}, progress: 0,
        createdAt: serverTimestamp(),
      });
    }
    addForm.reset();
    addModal.classList.add("hidden");
  };

  /* ── 랜덤 룰렛 ──────────────────────────── */
  rouletteBtn.onclick = () => {
    if (rouletteActive || zonesData.length === 0) return;
    const candidates = zonesData.filter(z => {
      const d = daysSince(z.lastCleaned);
      return d === null || d >= (z.cycle || 3);
    });
    const pool = candidates.length ? candidates : zonesData;
    let idx = 0, spins = 0, total = 14;
    rouletteActive = true;
    rouletteCard.classList.remove("hidden");

    const spin = () => {
      rouletteCard.textContent = `${pool[idx % pool.length].emoji} ${pool[idx % pool.length].name}`;
      idx++; spins++;
      if (spins < total) {
        setTimeout(spin, 80 + spins * 18);
      } else {
        const picked = pool[(idx-1) % pool.length];
        rouletteCard.textContent = `👉 ${picked.emoji} ${picked.name} 당첨!`;
        vibrateShort();
        rouletteActive = false;
        setTimeout(() => rouletteCard.classList.add("hidden"), 4000);
      }
    };
    spin();
  };

  /* ── 이모지 폭죽 ──────────────────────────────── */
  function launchConfetti(emoji) {
    const emojis = [emoji, "✨", "🎉", "⭐", emoji];
    for (let i = 0; i < 20; i++) {
      const el = document.createElement("span");
      el.className = "confetti-piece";
      el.textContent = emojis[i % emojis.length];
      el.style.left = Math.random() * 100 + "vw";
      el.style.animationDelay = Math.random() * 0.3 + "s";
      el.style.fontSize = (1 + Math.random() * 1) + "rem";
      confettiLayer.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }
  }

  function vibrateShort() { try { if (navigator.vibrate) navigator.vibrate(50); } catch(_) {} }

  /* ── 초기 진입 ──────────────────────────────────── */
  if (currentRole) updateMemberBadge();
  else renderMemberModal();

  addModal.addEventListener("click", e => {
    if (e.target === addModal) addModal.classList.add("hidden");
  });
</script>

<style>
  /* ── Reset & Base ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #F5F7F8;
    --card:    #FFFFFF;
    --text:    #2C3E50;
    --sub:     #7F8C8D;
    --green:   #2ECC71;
    --blue:    #3498DB;
    --red:     #E74C3C;
    --yellow:  #F1C40F;
    --border:  #EAECEE;
    --radius:  12px;
    --shadow:  0 2px 8px rgba(0,0,0,.05);
  }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 90px;
    overflow-x: hidden;
  }

  /* ── Header ──────────────────────────────────── */
  header {
    background: #fff;
    padding: 16px 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 1.15rem; font-weight: 800; }
  .member-control { display: flex; align-items: center; gap: 8px; }
  #member-badge { font-size: .9rem; font-weight: 700; }
  #change-member-btn {
    font-size: .75rem; background: var(--bg); border: none;
    border-radius: 6px; padding: 4px 8px; cursor: pointer; color: var(--sub);
  }

  /* ── King Banner ──────────────────────────────── */
  #king-banner {
    margin: 16px 16px 0;
    background: linear-gradient(135deg, #FFD700 0%, #FFA000 100%);
    color: #fff;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.95rem;
    text-align: center;
    box-shadow: 0 4px 12px rgba(255, 193, 7, 0.4);
    animation: popIn 0.4s ease;
  }
  #king-banner.hidden { display: none; }
  @keyframes popIn {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── Roulette ─────────────────────────────────── */
  .roulette-wrap { padding: 12px 16px 0; }
  #roulette-btn {
    width: 100%; padding: 12px; border-radius: var(--radius); border: none;
    background: #fff; color: var(--text); font-size: .95rem; font-weight: 700;
    cursor: pointer; box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  #roulette-card {
    margin-top: 8px; background: var(--yellow); border-radius: var(--radius);
    padding: 12px; font-size: 1rem; font-weight: 700; text-align: center;
  }
  .hidden { display: none !important; }

  /* ── Zones ────────────────────────────────────── */
  #zones { padding: 8px 16px; }

  .zone-group { margin-top: 16px; }
  .group-title {
    display: flex; justify-content: space-between; align-items: center;
    font-size: .95rem; font-weight: 800; color: var(--sub); margin-bottom: 8px;
    padding: 8px 10px; background: #EAECEE; border-radius: 8px;
    cursor: pointer; user-select: none;
  }
  .group-drag-handle {
    font-size: 1.2rem;
    color: #AAB7B8;
    cursor: grab;
    padding-right: 8px;
    touch-action: none;
  }
  .group-drag-handle:active { color: var(--blue); }
  .toggle-icon { font-size: .8rem; opacity: 0.7; }
  .sortable-ghost-group { opacity: 0.5; background: #EBF5FB; border-radius: 8px; }
  
  .group-list { display: flex; flex-direction: column; gap: 10px; }

  .zone-card {
    background: var(--card); border-radius: var(--radius); padding: 12px;
    box-shadow: var(--shadow); border: 1px solid var(--border); transition: all .2s;
    user-select: none; -webkit-user-select: none;
  }
  .zone-card.overdue { border-color: #FADBD8; background: #FDEDEC; }
  .zone-card.cleared { opacity: 0.8; border-color: #D5F5E3; }
  .sortable-ghost { opacity: 0.4; border: 2px dashed var(--blue); background: #EBF5FB; }

  .zone-main { display: flex; align-items: center; gap: 10px; }
  .zone-emoji { font-size: 1.6rem; flex-shrink: 0; min-width: 32px; text-align:center;}

  .zone-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .zone-name-row { display: flex; align-items: center; gap: 6px; }
  .zone-name { font-size: .95rem; font-weight: 700; }
  .assignee-badge {
    font-size: .65rem; background: var(--blue); color: #fff;
    padding: 2px 6px; border-radius: 4px; font-weight: 600;
  }

  .zone-meta { font-size: .75rem; color: var(--sub); }
  .divider { margin: 0 4px; opacity: 0.5; }
  .text-red { color: var(--red); }
  .text-green { color: var(--green); }
  .bold { font-weight: 700; }
  .last-who { font-size: .7rem; margin-left: 4px; }

  /* 컴팩트 액션 버튼들 */
  .zone-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  
  .action-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: #F8F9F9; display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem; cursor: pointer; transition: transform .1s, background .2s;
  }
  .action-btn:active { transform: scale(0.9); }
  
  .progress-btn { background: #fff; font-size: 1.2rem; } /* 달 모양을 위해 약간 더 크게 */
  .undo-btn { background: #D5F5E3; border-color: #A9DFBF; font-size: 1.1rem; }
  
  /* 코멘트가 있을 때 메모 버튼에 알림 표시 */
  .memo-btn { position: relative; }
  .memo-btn.has-memo::after {
    content: ""; position: absolute; top: -2px; right: -2px;
    width: 8px; height: 8px; background: var(--blue); border-radius: 50%;
  }
  
  .edit-btn { background: transparent; border: none; opacity: 0.6; }

  /* 코멘트 영역 스타일 */
  .zone-comments {
    margin-top: 12px; background: #F8F9F9; border-radius: 8px;
    padding: 10px; border: 1px solid #EAECEE;
  }
  .comments-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .comment-line {
    font-size: .8rem; color: var(--text); background: #fff;
    padding: 8px 10px; border-radius: 6px; border: 1px solid #EAECEE; line-height: 1.3;
  }
  .comment-author { font-weight: 700; color: var(--sub); margin-right: 4px; }
  
  .comment-input-wrap { display: flex; align-items: center; gap: 8px; }
  .my-comment-label { font-size: .75rem; font-weight: 700; color: var(--blue); white-space: nowrap; }
  .comment-input {
    flex: 1; background: #fff; border: 1px solid #D5D8DC; border-radius: 6px;
    padding: 8px 10px; font-size: .8rem; outline: none; color: var(--text);
  }
  .comment-input:focus { border-color: var(--blue); }

  /* ── Empty State ─────────────────────────────── */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--sub); }
  .empty-icon { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* ── FAB ──────────────────────────────────────── */
  #fab {
    position: fixed; bottom: 24px; right: calc(50% - 220px);
    width: 54px; height: 54px; border-radius: 50%; background: var(--blue);
    color: #fff; font-size: 1.8rem; border: none; box-shadow: 0 4px 12px rgba(52,152,219,.4);
    cursor: pointer; z-index: 50;
  }
  @media (max-width: 480px) { #fab { right: 20px; } }

  /* ── Modal Base ──────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    display: flex; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .modal-sheet {
    background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 36px;
    width: 100%; max-width: 480px; animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; text-align: center; }

  /* ── Forms ────────────────────────────── */
  .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: .8rem; font-weight: 600; color: var(--sub); }
  .form-group input, .form-group select {
    padding: 10px 12px; border-radius: 8px; border: 1px solid #D5D8DC;
    font-size: .95rem; outline: none; background: #fff;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue); }

  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: 10px; border: none; background: #EAECEE;
    font-size: .95rem; font-weight:600; cursor: pointer; color: var(--text);
  }
  .btn-submit {
    flex: 2; padding: 12px; border-radius: 10px; border: none; background: var(--blue);
    color: #fff; font-size: .95rem; font-weight: 700; cursor: pointer;
  }
  .btn-delete-link {
    width: 100%; text-align: center; margin-top: 16px; font-size: .85rem; color: var(--red);
    background: none; border: none; cursor: pointer; text-decoration: underline;
  }

  /* ── Confetti ─────────────────────────────────── */
  #confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 199; overflow: hidden; }
  .confetti-piece { position: absolute; bottom: -20px; animation: rise 1.4s ease-out forwards; }
  @keyframes rise {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-80vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- 역할 설정 모달 -->
<div class="modal-overlay hidden" id="member-modal">
  <div class="modal-sheet">
    <p class="modal-title">👋 내 역할과 이모지 선택</p>
    <div class="form-group">
      <label>역할 (당번용)</label>
      <select id="inp-role"></select>
    </div>
    <div class="form-group">
      <label>나만의 프로필 이모지</label>
      <input type="text" id="inp-profile-emoji" maxlength="2" placeholder="예: 🐻" />
    </div>
    <button class="btn-submit" id="save-member-btn" style="width: 100%; margin-top: 10px;">저장하고 시작하기</button>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-overlay hidden" id="add-modal">
  <div class="modal-sheet">
    <p class="modal-title" id="modal-title">항목 추가</p>
    <form id="add-form" autocomplete="off">
      <div class="form-group">
        <label>항목 이름</label>
        <input id="inp-name" type="text" placeholder="예: 소파 밑, 수학 문제집 풀기 …" required />
      </div>
      <div class="form-group">
        <label>그룹 분류 (폴더 지정)</label>
        <input id="inp-category" type="text" placeholder="예: 거실, 안방, 숙제, 운동 …" required />
      </div>
      <div class="form-group" style="display:flex; flex-direction:row; gap:10px;">
        <div style="flex:1;">
          <label>이모지</label>
          <input id="inp-emoji" type="text" placeholder="📝" maxlength="4" style="width:100%;" />
        </div>
        <div style="flex:1;">
          <label>목표 주기 (일)</label>
          <input id="inp-cycle" type="number" min="1" value="1" required style="width:100%;" />
        </div>
      </div>
      <div class="form-group">
        <label>담당 당번 지정</label>
        <select id="inp-assignee"></select>
      </div>
      <div class="btn-row">
        <button type="button" class="btn-cancel" id="close-add-modal">닫기</button>
        <button type="submit" class="btn-submit" id="submit-label">추가하기</button>
      </div>
      <button type="button" class="btn-delete-link hidden" id="btn-delete-zone">이 항목 삭제하기</button>
    </form>
  </div>
</div>

<!-- 헤더 -->
<header>
  <div class="header-row">
    <span class="header-title">📋 우리 집 매니저</span>
    <div class="member-control">
      <span id="member-badge"></span>
      <button id="change-member-btn">변경</button>
    </div>
  </div>
</header>

<!-- 활동왕 랭킹 배너 -->
<div id="king-banner" class="hidden"></div>

<!-- 랜덤 룰렛 -->
<div class="roulette-wrap">
  <button id="roulette-btn">🎲 오늘 뭐 할까? (랜덤 뽑기)</button>
  <div id="roulette-card" class="hidden"></div>
</div>

<!-- 항목 목록 -->
<div id="zones"></div>

<!-- FAB -->
<button id="fab" title="항목 추가">+</button>

<!-- 폭죽 레이어 -->
<div id="confetti-layer"></div>

</body>
</html>
